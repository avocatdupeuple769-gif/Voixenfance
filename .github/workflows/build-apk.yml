name: Build VoixEnfance APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install workspace dependencies
        run: pnpm install

      - name: Expo Prebuild (generate Android native project)
        working-directory: artifacts/guardian-gabon
        run: npx expo prebuild --platform android --clean --no-install
        env:
          EXPO_NO_TELEMETRY: 1
          CI: 1

      - name: Make Gradle executable
        working-directory: artifacts/guardian-gabon/android
        run: chmod +x gradlew

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('artifacts/guardian-gabon/android/**/*.gradle*') }}
          restore-keys: gradle-

      - name: Build Release APK
        working-directory: artifacts/guardian-gabon/android
        run: ./gradlew assembleRelease --no-daemon
        env:
          GRADLE_OPTS: -Xmx4g -XX:MaxMetaspaceSize=512m

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: VoixEnfance-Android-APK
          path: artifacts/guardian-gabon/android/app/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: Build success
        run: |
          echo "✅ Build terminé !"
          find artifacts/guardian-gabon/android/app/build/outputs/apk -name "*.apk" -exec ls -lh {} \;
