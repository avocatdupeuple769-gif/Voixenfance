name: Build VoixEnfance APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Prepare standalone package.json
        working-directory: artifacts/guardian-gabon
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            const catalog = {
              '@tanstack/react-query': '^5.90.21',
              'react': '19.1.0',
              'react-dom': '19.1.0',
              'zod': '^3.25.76'
            };
            function resolve(deps) {
              if (!deps) return deps;
              const out = {};
              for (const [k, v] of Object.entries(deps)) {
                if (k === '@workspace/api-client-react') continue;
                out[k] = v === 'catalog:' ? (catalog[k] || v) : v;
              }
              return out;
            }
            pkg.devDependencies = resolve(pkg.devDependencies);
            pkg.dependencies = resolve(pkg.dependencies);
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));
            console.log('package.json resolved successfully');
          "

      - name: Install dependencies with npm
        working-directory: artifacts/guardian-gabon
        run: npm install --legacy-peer-deps

      - name: Create root node_modules symlink (for Metro bundler)
        run: |
          ln -sf artifacts/guardian-gabon/node_modules node_modules
          echo "Symlink créé: $(readlink node_modules)"

      - name: Expo Prebuild
        working-directory: artifacts/guardian-gabon
        run: npx expo prebuild --platform android --clean --no-install
        env:
          EXPO_NO_TELEMETRY: 1
          CI: 1

      - name: Make Gradle executable
        working-directory: artifacts/guardian-gabon/android
        run: chmod +x gradlew

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('artifacts/guardian-gabon/android/**/*.gradle*') }}
          restore-keys: gradle-

      - name: Build Release APK
        working-directory: artifacts/guardian-gabon/android
        run: ./gradlew assembleRelease --no-daemon
        env:
          GRADLE_OPTS: -Xmx4g -XX:MaxMetaspaceSize=512m

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: VoixEnfance-Android-APK
          path: artifacts/guardian-gabon/android/app/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: Build success
        run: |
          echo "✅ Build terminé !"
          find artifacts/guardian-gabon/android/app/build/outputs/apk -name "*.apk" -exec ls -lh {} \;
